<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulyator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0d0e12;
    --case: #2b2b30;
    --case-edge: #38383e;
    --screen: #0e1a12;
    --screen-glow: #8bf29c;
    --screen-dim: rgba(139,242,156,0.35);
    --key-num: #3d3d44;
    --key-num-hover: #48484f;
    --key-fn: #55565f;
    --key-op: #d99a4e;
    --key-op-hover: #e2a95f;
    --key-eq: #6bbf7a;
    --key-eq-hover: #7bcf8a;
    --text: #eceef0;
    --tape-bg: #f4f1e8;
    --tape-text: #2b2b28;
    --lcd: 'Share Tech Mono', monospace;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', sans-serif;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    min-height:100vh;
    background: radial-gradient(circle at 30% 20%, #1a1b21, var(--bg) 70%);
    display:flex; align-items:center; justify-content:center;
    padding: 28px 14px;
    font-family: var(--sans);
    color: var(--text);
  }

  .device{
    width:100%; max-width: 340px;
    background: linear-gradient(155deg, var(--case-edge), var(--case) 40%);
    border-radius: 26px;
    padding: 18px 16px 20px;
    box-shadow:
      0 40px 80px -30px rgba(0,0,0,0.7),
      inset 0 1px 0 rgba(255,255,255,0.06);
  }

  /* Tape */
  .tape-window{
    background: var(--tape-bg);
    border-radius: 10px 10px 4px 4px;
    padding: 10px 12px 8px;
    margin-bottom: 12px;
    max-height: 74px;
    overflow-y: auto;
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.25);
  }
  .tape-window::-webkit-scrollbar{ width:4px; }
  .tape-line{
    font-family: var(--mono);
    font-size: 11px;
    color: var(--tape-text);
    opacity: 0.75;
    text-align:right;
    line-height: 1.7;
    border-bottom: 1px dashed rgba(0,0,0,0.12);
  }
  .tape-line:last-child{ border-bottom:none; }
  .tape-empty{
    font-family: var(--mono);
    font-size: 11px;
    color: rgba(0,0,0,0.3);
    text-align:center;
    padding: 6px 0;
  }

  /* Screen */
  .screen{
    background: var(--screen);
    border-radius: 12px;
    padding: 16px 16px 14px;
    margin-bottom: 16px;
    box-shadow: inset 0 2px 10px rgba(0,0,0,0.6);
    position:relative;
    overflow:hidden;
  }
  .screen::after{
    content:'';
    position:absolute; inset:0;
    background: repeating-linear-gradient(rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 3px);
    pointer-events:none;
  }
  .expr{
    font-family: var(--lcd);
    font-size: 14px;
    color: var(--screen-dim);
    text-align:right;
    min-height: 18px;
    letter-spacing: 0.5px;
    white-space: nowrap;
    overflow-x: auto;
  }
  .result{
    font-family: var(--lcd);
    font-size: 42px;
    color: var(--screen-glow);
    text-align:right;
    text-shadow: 0 0 12px rgba(139,242,156,0.5);
    white-space: nowrap;
    overflow-x: auto;
    letter-spacing: 1px;
  }

  /* Keypad */
  .keypad{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .key{
    border:none;
    border-radius: 14px;
    height: 56px;
    font-family: var(--mono);
    font-size: 17px;
    font-weight:500;
    color: var(--text);
    cursor:pointer;
    background: var(--key-num);
    box-shadow: 0 3px 0 rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.06);
    transition: transform .08s ease, box-shadow .08s ease, background .15s ease;
  }
  .key:hover{ background: var(--key-num-hover); }
  .key:active{ transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.35); }

  .key.fn{ background: var(--key-fn); font-size:14.5px; }
  .key.fn:hover{ background: #61626b; }

  .key.op{ background: var(--key-op); color:#2b1c07; }
  .key.op:hover{ background: var(--key-op-hover); }

  .key.eq{ background: var(--key-eq); color:#0d2410; }
  .key.eq:hover{ background: var(--key-eq-hover); }

  .key.zero{ grid-column: span 2; }

  @media (prefers-reduced-motion: reduce){
    .key{ transition:none; }
  }
</style>
</head>
<body>

<div class="device">

  <div class="tape-window" id="tape">
    <div class="tape-empty">Hisoblash tarixi shu yerda ko'rinadi</div>
  </div>

  <div class="screen">
    <div class="expr" id="expr">&nbsp;</div>
    <div class="result" id="result">0</div>
  </div>

  <div class="keypad">
    <button class="key fn" data-action="clear">AC</button>
    <button class="key fn" data-action="del">DEL</button>
    <button class="key fn" data-action="percent">%</button>
    <button class="key op" data-action="op" data-op="÷">÷</button>

    <button class="key" data-num="7">7</button>
    <button class="key" data-num="8">8</button>
    <button class="key" data-num="9">9</button>
    <button class="key op" data-action="op" data-op="×">×</button>

    <button class="key" data-num="4">4</button>
    <button class="key" data-num="5">5</button>
    <button class="key" data-num="6">6</button>
    <button class="key op" data-action="op" data-op="−">−</button>

    <button class="key" data-num="1">1</button>
    <button class="key" data-num="2">2</button>
    <button class="key" data-num="3">3</button>
    <button class="key op" data-action="op" data-op="+">+</button>

    <button class="key zero" data-num="0">0</button>
    <button class="key" data-action="decimal">.</button>
    <button class="key eq" data-action="equals">=</button>
  </div>

</div>

<script>
  // ===== Kalkulyator holati =====
  let current = '0';      // ekranda ko'rinayotgan joriy son
  let previous = null;    // oldingi son
  let operator = null;    // tanlangan amal: +, −, ×, ÷
  let waitingForNew = false; // yangi son kiritishni kutyapmizmi

  const exprEl = document.getElementById('expr');
  const resultEl = document.getElementById('result');
  const tapeEl = document.getElementById('tape');

  const opSymbols = { '+':'+', '−':'-', '×':'*', '÷':'/' };

  function updateScreen(){
    resultEl.textContent = current;
    exprEl.textContent = previous !== null ? `${previous} ${operator || ''}` : '\u00A0';
  }

  function inputNumber(n){
    if (waitingForNew){
      current = n;
      waitingForNew = false;
    } else {
      current = current === '0' ? n : current + n;
    }
    updateScreen();
  }

  function inputDecimal(){
    if (waitingForNew){ current = '0.'; waitingForNew = false; updateScreen(); return; }
    if (!current.includes('.')) current += '.';
    updateScreen();
  }

  function compute(a, op, b){
    a = parseFloat(a); b = parseFloat(b);
    switch(op){
      case '+': return a + b;
      case '−': return a - b;
      case '×': return a * b;
      case '÷': return b === 0 ? NaN : a / b;
      default: return b;
    }
  }

  function chooseOperator(op){
    if (operator && !waitingForNew){
      current = String(round(compute(previous, operator, current)));
    }
    previous = current;
    operator = op;
    waitingForNew = true;
    updateScreen();
  }

  function round(n){
    if (isNaN(n)) return 'Xato';
    return Math.round((n + Number.EPSILON) * 1e10) / 1e10;
  }

  function equals(){
    if (operator === null || previous === null) return;
    const a = previous, op = operator, b = current;
    const value = round(compute(a, op, b));
    addToTape(`${a} ${op} ${b} = ${value}`);
    current = String(value);
    previous = null;
    operator = null;
    waitingForNew = true;
    updateScreen();
  }

  function clearAll(){
    current = '0'; previous = null; operator = null; waitingForNew = false;
    updateScreen();
  }

  function del(){
    if (waitingForNew) return;
    current = current.length > 1 ? current.slice(0, -1) : '0';
    updateScreen();
  }

  function percent(){
    current = String(round(parseFloat(current) / 100));
    updateScreen();
  }

  function addToTape(line){
    const emptyMsg = tapeEl.querySelector('.tape-empty');
    if (emptyMsg) emptyMsg.remove();
    const div = document.createElement('div');
    div.className = 'tape-line';
    div.textContent = line;
    tapeEl.appendChild(div);
    tapeEl.scrollTop = tapeEl.scrollHeight;
  }

  // ===== Tugma bosishlarni ushlash =====
  document.querySelectorAll('.key').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.num !== undefined) inputNumber(btn.dataset.num);
      else if (btn.dataset.action === 'decimal') inputDecimal();
      else if (btn.dataset.action === 'op') chooseOperator(btn.dataset.op);
      else if (btn.dataset.action === 'equals') equals();
      else if (btn.dataset.action === 'clear') clearAll();
      else if (btn.dataset.action === 'del') del();
      else if (btn.dataset.action === 'percent') percent();
    });
  });

  // ===== Klaviatura orqali boshqarish =====
  window.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') inputNumber(e.key);
    else if (e.key === '.') inputDecimal();
    else if (e.key === '+') chooseOperator('+');
    else if (e.key === '-') chooseOperator('−');
    else if (e.key === '*') chooseOperator('×');
    else if (e.key === '/') { e.preventDefault(); chooseOperator('÷'); }
    else if (e.key === 'Enter' || e.key === '=') equals();
    else if (e.key === 'Backspace') del();
    else if (e.key === 'Escape') clearAll();
    else if (e.key === '%') percent();
  });

  updateScreen();
</script>

</body>
</html>
